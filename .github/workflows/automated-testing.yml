name: Automated Testing

on:
  workflow_dispatch:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *' # Daily at 02:00 UTC (09:00 Asia/Ho_Chi_Minh)

concurrency:
  group: automated-testing-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '18'

  # Force MySQL like prod (no sqlite)
  APP_ENV: testing
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: zenamanage_test
  DB_USERNAME: test_user
  DB_PASSWORD: test_password

  # Redis (if your app uses it)
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379

jobs:
  php-tests:
    name: PHP Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: Unit
            test_path: tests/Unit
            with_coverage: true
            coverage_file: coverage-unit.xml
            codecov_flag: unittests

          - suite: Feature
            test_path: tests/Feature
            with_coverage: true
            coverage_file: coverage-feature.xml
            codecov_flag: featuretests

          - suite: Integration
            test_path: tests/Integration
            with_coverage: true
            coverage_file: coverage-integration.xml
            codecov_flag: integrationtests

          - suite: Performance
            test_path: tests/Performance
            with_coverage: false

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: zenamanage_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, gd, zip, bcmath, opcache
          coverage: ${{ matrix.with_coverage && 'xdebug' || 'none' }}

      - name: Install MySQL/Redis CLI tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client redis-tools

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ env.PHP_VERSION }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ env.PHP_VERSION }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare .env.testing (force MySQL/Redis)
        run: |
          set -euo pipefail
          ENV_FILE=.env.testing
          cp .env.example "$ENV_FILE"

          set_kv () {
            local key="$1"
            local val="$2"
            local file="$3"
            if grep -qE "^${key}=" "$file"; then
              sed -i "s|^${key}=.*|${key}=${val}|" "$file"
            else
              echo "${key}=${val}" >> "$file"
            fi
          }

          set_kv APP_ENV testing "$ENV_FILE"
          set_kv DB_CONNECTION "${{ env.DB_CONNECTION }}" "$ENV_FILE"
          set_kv DB_HOST "${{ env.DB_HOST }}" "$ENV_FILE"
          set_kv DB_PORT "${{ env.DB_PORT }}" "$ENV_FILE"
          set_kv DB_DATABASE "${{ env.DB_DATABASE }}" "$ENV_FILE"
          set_kv DB_USERNAME "${{ env.DB_USERNAME }}" "$ENV_FILE"
          set_kv DB_PASSWORD "${{ env.DB_PASSWORD }}" "$ENV_FILE"
          set_kv REDIS_HOST "${{ env.REDIS_HOST }}" "$ENV_FILE"
          set_kv REDIS_PORT "${{ env.REDIS_PORT }}" "$ENV_FILE"

          php artisan key:generate --env=testing
          mkdir -p storage/framework/{cache,sessions,views,testing} bootstrap/cache
          chmod -R ug+rwx storage bootstrap/cache || true
          php artisan optimize:clear --env=testing

      - name: Ensure storage directories
        run: mkdir -p storage/framework/{cache,sessions,views,testing} storage/logs bootstrap/cache

      - name: Wait for MySQL to be ready
        run: |
          set -euo pipefail
          for i in {1..60}; do
            mysqladmin ping -h ${{ env.DB_HOST }} -u root -proot_password && break
            echo "Waiting for MySQL... ($i/60)"
            sleep 2
          done
          mysql -h ${{ env.DB_HOST }} -u root -proot_password -e "SELECT VERSION();"
          mysql -h ${{ env.DB_HOST }} -u root -proot_password -e "SHOW DATABASES;"

      - name: Create database (idempotent)
        run: |
          set -euo pipefail
          mysql -h ${{ env.DB_HOST }} -u root -proot_password -e "CREATE DATABASE IF NOT EXISTS \`${{ env.DB_DATABASE }}\`;"
          mysql -h ${{ env.DB_HOST }} -u root -proot_password -e "GRANT ALL PRIVILEGES ON \`${{ env.DB_DATABASE }}\`.* TO '${{ env.DB_USERNAME }}'@'%'; FLUSH PRIVILEGES;"

      - name: Run database migrations
        run: php artisan migrate --env=testing --force

      - name: Run database seeders
        run: php artisan db:seed --env=testing --force

      - name: Run ${{ matrix.suite }} Tests
        run: |
          set -euo pipefail
          if [ "${{ matrix.with_coverage }}" = "true" ]; then
            php artisan test ${{ matrix.test_path }} --env=testing --coverage --coverage-clover=${{ matrix.coverage_file }}
          else
            php artisan test ${{ matrix.test_path }} --env=testing
          fi

      - name: Upload Coverage Artifact
        if: matrix.with_coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.suite }}
          path: ${{ matrix.coverage_file }}
          if-no-files-found: error

      - name: Upload Coverage to Codecov
        if: matrix.with_coverage
        uses: codecov/codecov-action@v3
        with:
          file: ${{ matrix.coverage_file }}
          flags: ${{ matrix.codecov_flag }}
          name: php-${{ matrix.suite }}

  security-tests:
    name: Security & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, gd, zip, bcmath, opcache
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ env.PHP_VERSION }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ env.PHP_VERSION }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Composer Audit (non-blocking)
        run: |
          composer audit --format=json > composer-audit.json || true

      - name: Upload Composer Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: composer-audit
          path: composer-audit.json

      - name: PHPStan (run if installed)
        run: |
          if [ -f vendor/bin/phpstan ]; then
            ./vendor/bin/phpstan analyse --error-format=json > phpstan-report.json
          else
            echo '{"note":"phpstan not installed (add to composer dev deps to enable)"}' > phpstan-report.json
          fi

      - name: Upload PHPStan Report
        uses: actions/upload-artifact@v4
        with:
          name: phpstan-report
          path: phpstan-report.json

      - name: PHP-CS-Fixer (run if installed)
        run: |
          if [ -f vendor/bin/php-cs-fixer ]; then
            ./vendor/bin/php-cs-fixer fix --dry-run --diff --format=json > cs-fixer-report.json || true
          else
            echo '{"note":"php-cs-fixer not installed (add to composer dev deps to enable)"}' > cs-fixer-report.json
          fi

      - name: Upload CS Fixer Report
        uses: actions/upload-artifact@v4
        with:
          name: cs-fixer-report
          path: cs-fixer-report.json

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [php-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Unit Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-Unit
          path: coverage/

      - name: Download Feature Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-Feature
          path: coverage/

      - name: Download Integration Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-Integration
          path: coverage/

      - name: Build coverage summary (from clover xml)
        run: |
          set -euo pipefail
          php -r '
          $files = glob("coverage/*.xml");
          if (!$files) { file_put_contents("coverage-summary.txt", "No coverage xml found.\n"); exit(0); }

          $out = [];
          foreach ($files as $f) {
            $xml = @simplexml_load_file($f);
            if (!$xml) { $out[] = basename($f).": (invalid xml)"; continue; }

            $m = $xml->xpath("/coverage/project/metrics")[0] ?? $xml->xpath("//project/metrics")[0] ?? null;
            if (!$m) { $out[] = basename($f).": (no metrics)"; continue; }

            $statements = (int)$m["statements"];
            $covered = (int)$m["coveredstatements"];
            $pct = $statements > 0 ? round($covered / $statements * 100, 2) : 0;

            $out[] = sprintf("%s: %s%% (%d/%d statements)", basename($f), $pct, $covered, $statements);
          }
          file_put_contents("coverage-summary.txt", implode(PHP_EOL, $out).PHP_EOL);
          '

      - name: Upload Coverage Summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.txt

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('coverage-summary.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Coverage Report\n\`\`\`\n${coverage}\n\`\`\``
            });
