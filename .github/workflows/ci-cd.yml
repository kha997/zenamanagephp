name: CI/CD Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

env:
  COMPOSER_PROCESS_TIMEOUT: 0

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: zenamanage_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql
        coverage: pcov
        ini-values: |
          pcov.enabled=1
          pcov.directory=app
          pcov.exclude="~vendor~"

    - name: Verify PCOV loaded
      run: php -r "if (!extension_loaded('pcov')) { fwrite(STDERR, 'PCOV missing\n'); exit(1);} echo 'PCOV loaded\n';"
    
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
    
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    
    - name: Generate key
      run: php artisan key:generate
    
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
    
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite
    
    - name: Execute tests (Unit and Feature tests) via PHPUnit
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: zenamanage_test
        DB_USERNAME: root
        DB_PASSWORD: password
      run: php artisan test --coverage --coverage-clover=coverage.xml

    - name: Upload coverage reports to Codecov
      if: ${{ env.CODECOV_TOKEN != '' }}
      uses: codecov/codecov-action@v3
      with:
        token: ${{ env.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql, sqlite3, pdo_sqlite
        ini-values: |
          pcov.enabled=1
          pcov.directory=app
          pcov.exclude="~vendor~"
    
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Prepare environment for SSOT lint
      run: |
        mkdir -p database
        touch database/database.sqlite
        php -r 'file_put_contents(".env", "APP_NAME=ZenaManage\nAPP_ENV=ci\nAPP_KEY=base64:".base64_encode(random_bytes(32))."\nAPP_DEBUG=true\nAPP_URL=http://localhost\nLOG_CHANNEL=stack\nCACHE_STORE=file\nCACHE_DRIVER=file\nQUEUE_CONNECTION=sync\nSESSION_DRIVER=file\nDB_CONNECTION=sqlite\nDB_DATABASE=".getcwd()."/database/database.sqlite\n");'
    
    - name: Check Duplicate Imports
      run: |
        echo "🔍 Checking for duplicate imports..."
        php check_duplicate_imports.php
        if [ $? -ne 0 ]; then
          echo "❌ Duplicate imports found!"
          exit 1
        fi
        echo "✅ No duplicate imports found!"
    
    - name: Run Security Check
      run: |
        composer audit || true

    - name: Diagnostic optimize:clear
      run: php artisan optimize:clear -vvv

    - name: Run SSOT Lint
      run: composer ssot:lint

  deploy:
    needs: [test, code-quality]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production
      run: |
        echo "Deploying to production..."
        # Add your deployment commands here
