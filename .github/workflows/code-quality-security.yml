name: Code Quality & Security

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [ main, develop, feature/* ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM

env:
  PHP_VERSION: '8.2'
  REPORT_SUMMARY_LIMIT: '20'

permissions:
  contents: read
  pull-requests: write
  issues: write
  security-events: write

jobs:
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, gd, zip, bcmath, opcache

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-progress --no-suggest

    - name: Run PHPStan Static Analysis
      continue-on-error: true
      run: |
        composer require --dev phpstan/phpstan
        bash scripts/ci/run-json-report-command.sh phpstan-report.json phpstan ./vendor/bin/phpstan analyse --level=8 --error-format=json

    - name: Summarize PHPStan Static Analysis
      if: always()
      run: |
        {
          echo "## PHPStan"
          echo '```text'
          php scripts/ci/print-phpstan-summary.php phpstan-report.json "${REPORT_SUMMARY_LIMIT}" || true
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Run PHP CS Fixer
      continue-on-error: true
      run: |
        composer require --dev friendsofphp/php-cs-fixer
        bash scripts/ci/run-json-report-command.sh cs-fixer-report.json php-cs-fixer ./vendor/bin/php-cs-fixer fix --dry-run --diff --format=json

    - name: Run PHP Mess Detector
      continue-on-error: true
      run: |
        composer require --dev phpmd/phpmd
        ./vendor/bin/phpmd app text cleancode,codesize,controversial,design,naming,unusedcode > phpmd-report.txt

    - name: Run PHP Copy Paste Detector
      continue-on-error: true
      run: |
        composer require --dev sebastian/phpcpd
        ./vendor/bin/phpcpd app --min-lines=5 --min-tokens=70 > phpcpd-report.txt

    - name: Upload Code Quality Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports
        path: |
          phpstan-report.json
          phpstan-report.stderr.log
          cs-fixer-report.json
          phpmd-report.txt
          phpcpd-report.txt

    - name: Comment Code Quality on PR
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const phpstan = JSON.parse(fs.readFileSync('phpstan-report.json', 'utf8'));
          const csFixer = JSON.parse(fs.readFileSync('cs-fixer-report.json', 'utf8'));
          
          let comment = '## Code Quality Report\n\n';
          const phpstanErrors = phpstan.totals?.errors ?? phpstan.totals?.file_errors ?? phpstan.totals?.errors ?? 0;
          
          if (phpstanErrors > 0) {
            comment += `### PHPStan Issues: ${phpstanErrors} errors\n`;
          }
          
          if (csFixer.files && csFixer.files.length > 0) {
            comment += `\n### Code Style Issues: ${csFixer.files.length} files need fixing\n`;
          } else if (csFixer.status && csFixer.status !== 'ok_without_json_output') {
            comment += `\n### Code Style Issues\n- php-cs-fixer exited with status: ${csFixer.status}\n`;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, gd, zip, bcmath, opcache

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-progress --no-suggest

    - name: Run Composer Security Audit
      run: composer audit --format=json > composer-audit.json || true

    - name: Run PHP Security Checker
      continue-on-error: true
      run: |
        composer require --dev enlightn/security-checker
        bash scripts/ci/run-json-report-command.sh security-checker.json security-checker ./vendor/bin/security-checker security:check --format=json

    - name: Run PHPStan Security Rules
      continue-on-error: true
      run: |
        composer require --dev phpstan/phpstan-security-rules
        bash scripts/ci/run-json-report-command.sh phpstan-security.json phpstan-security ./vendor/bin/phpstan analyse --level=8 --error-format=json

    - name: Summarize Security Scans
      if: always()
      run: |
        {
          echo "## Security Checker"
          echo '```text'
          php scripts/ci/print-json-report-summary.php security-checker.json "security-checker" "${REPORT_SUMMARY_LIMIT}" || true
          echo '```'
          echo
          echo "## PHPStan Security"
          echo '```text'
          php scripts/ci/print-phpstan-summary.php phpstan-security.json "${REPORT_SUMMARY_LIMIT}" || true
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Run PHP CS Fixer Security Rules
      continue-on-error: true
      run: |
        composer require --dev friendsofphp/php-cs-fixer
        bash scripts/ci/run-json-report-command.sh cs-fixer-security.json php-cs-fixer-security ./vendor/bin/php-cs-fixer fix --dry-run --diff --format=json

    - name: Upload Security Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          composer-audit.json
          security-checker.json
          security-checker.stderr.log
          phpstan-security.json
          phpstan-security.stderr.log
          cs-fixer-security.json

    - name: Comment Security Issues on PR
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const composerAudit = JSON.parse(fs.readFileSync('composer-audit.json', 'utf8'));
          const securityChecker = JSON.parse(fs.readFileSync('security-checker.json', 'utf8'));
          
          let comment = '## Security Scan Report\n\n';
          const advisories = composerAudit.advisories
            ? Array.isArray(composerAudit.advisories)
              ? composerAudit.advisories
              : Object.values(composerAudit.advisories).flat()
            : [];
          
          if (advisories.length > 0) {
            comment += `### Composer Security Issues: ${advisories.length} vulnerabilities found\n`;
            advisories.slice(0, 5).forEach(advisory => {
              comment += `- ${advisory.packageName}: ${advisory.title}\n`;
            });
          }
          
          if (securityChecker.vulnerabilities && securityChecker.vulnerabilities.length > 0) {
            comment += `\n### Security Checker Issues: ${securityChecker.vulnerabilities.length} vulnerabilities found\n`;
            securityChecker.vulnerabilities.slice(0, 5).forEach(vuln => {
              comment += `- ${vuln.package}: ${vuln.title}\n`;
            });
          }
          
          if (advisories.length === 0 && (!securityChecker.vulnerabilities || securityChecker.vulnerabilities.length === 0)) {
            comment += '✅ No security vulnerabilities found!';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, gd, zip, bcmath, opcache

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-progress --no-suggest

    - name: Run Composer Outdated Check
      continue-on-error: true
      run: |
        bash scripts/ci/run-json-report-command.sh composer-outdated.json composer-outdated composer outdated --format=json

    - name: Run Composer Require Checker
      continue-on-error: true
      run: |
        composer require --dev maglnet/composer-require-checker
        set +e
        ./vendor/bin/composer-require-checker check --output composer-require-checker.txt > composer-require-checker.stdout.log 2> composer-require-checker.stderr.log
        status=$?
        set -e
        if [[ ! -f composer-require-checker.txt ]]; then
          touch composer-require-checker.txt
        fi
        exit $status

    - name: Summarize Dependency Reports
      if: always()
      run: |
        {
          echo "## Composer Outdated"
          echo '```text'
          php scripts/ci/print-json-report-summary.php composer-outdated.json "composer-outdated" 10 || true
          echo '```'
          echo
          echo "## Composer Require Checker"
          echo '```text'
          sed -n '1,40p' composer-require-checker.txt || true
          sed -n '1,40p' composer-require-checker.stderr.log || true
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload Dependency Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-reports
        path: |
          composer-outdated.json
          composer-require-checker.txt
          composer-require-checker.stdout.log
          composer-require-checker.stderr.log

    - name: Comment Dependency Issues on PR
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const outdated = JSON.parse(fs.readFileSync('composer-outdated.json', 'utf8'));
          
          let comment = '## Dependency Scan Report\n\n';
          
          if (outdated.installed && outdated.installed.length > 0) {
            comment += `### Outdated Packages: ${outdated.installed.length} packages need updates\n`;
            outdated.installed.slice(0, 10).forEach(pkg => {
              comment += `- ${pkg.name}: ${pkg.version} → ${pkg.latest}\n`;
            });
          } else {
            comment += '✅ All packages are up to date!';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.prod
        push: false
        tags: zenamanage:test
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Verify image present
      run: docker image inspect zenamanage:test

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.33.1
      with:
        image-ref: 'zenamanage:test'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Trivy vulnerability scanner (JSON)
      uses: aquasecurity/trivy-action@0.33.1
      with:
        image-ref: 'zenamanage:test'
        format: 'json'
        output: 'trivy-results.json'

    - name: Upload Trivy JSON results
      uses: actions/upload-artifact@v4
      with:
        name: trivy-results
        path: trivy-results.json

    - name: Comment Docker Security Issues on PR
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const trivyResults = JSON.parse(fs.readFileSync('trivy-results.json', 'utf8'));
          
          let comment = '## Docker Security Scan Report\n\n';
          
          if (trivyResults.Results && trivyResults.Results.length > 0) {
            let totalVulns = 0;
            trivyResults.Results.forEach(result => {
              if (result.Vulnerabilities) {
                totalVulns += result.Vulnerabilities.length;
              }
            });
            
            comment += `### Vulnerabilities Found: ${totalVulns} total\n`;
            
            trivyResults.Results.forEach(result => {
              if (result.Vulnerabilities && result.Vulnerabilities.length > 0) {
                comment += `\n#### ${result.Target}\n`;
                result.Vulnerabilities.slice(0, 5).forEach(vuln => {
                  comment += `- ${vuln.VulnerabilityID}: ${vuln.Title} (${vuln.Severity})\n`;
                });
              }
            });
          } else {
            comment += '✅ No vulnerabilities found in Docker image!';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  license-scan:
    name: License Compliance Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, redis, gd, zip, bcmath, opcache

    - name: Cache Composer dependencies
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install Composer dependencies
      run: composer install --prefer-dist --no-progress --no-suggest

    - name: Run Composer Require Checker
      continue-on-error: true
      run: |
        composer require --dev maglnet/composer-require-checker
        set +e
        ./vendor/bin/composer-require-checker check --output composer-license-check.txt > composer-license-check.stdout.log 2> composer-license-check.stderr.log
        status=$?
        set -e
        if [[ ! -f composer-license-check.txt ]]; then
          touch composer-license-check.txt
        fi
        exit $status

    - name: Summarize License Scan
      if: always()
      run: |
        {
          echo "## License Check"
          echo '```text'
          sed -n '1,40p' composer-license-check.txt || true
          sed -n '1,40p' composer-license-check.stderr.log || true
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload License Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: license-report
        path: |
          composer-license-check.txt
          composer-license-check.stdout.log
          composer-license-check.stderr.log

    - name: Comment License Issues on PR
      if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
      continue-on-error: true
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const summary = fs.existsSync('composer-license-check.txt')
            ? fs.readFileSync('composer-license-check.txt', 'utf8').trim()
            : '';
          
          let comment = '## License Compliance Report\n\n';

          if (summary.length > 0) {
            comment += '```text\n';
            comment += summary.split('\n').slice(0, 20).join('\n');
            comment += '\n```';
          } else {
            comment += '✅ All packages comply with license requirements!';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
